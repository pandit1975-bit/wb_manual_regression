{% extends "core/base.html" %}
{% block content %}

<h2 class="text-xl mb-4">Request Groups</h2>

<form method="post" class="flex gap-2 mb-4">
{% csrf_token %}

<input name="name"
placeholder="Group Name"
class="bg-gray-800 border border-gray-700 px-3 py-2 rounded">

<button type="submit"
class="bg-blue-600 px-3 py-2 rounded">
Create Group
</button>

</form>

{% for g in groups %}

<div class="mt-6 border border-gray-700 p-4 rounded-lg bg-gray-900">

<!-- GROUP HEADER -->
<div class="flex justify-between items-center mb-3">

<div class="font-semibold text-lg">
{{ g.name }}
</div>

<button type="button"
class="delete-group
text-red-500 hover:text-red-400
px-2 py-1 text-xs"
data-id="{{g.id}}">
<i class="fa-solid fa-trash"></i>
</button>

</div>

<!-- ADD REQUEST ROW -->
<div class="flex gap-2 mb-3">

<select id="env-{{g.id}}"
class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-sm">

<option value="">Env</option>
<option value="stage">STAGE</option>
<option value="prod">PROD</option>

</select>

<input
id="req-{{g.id}}"
placeholder="Request ID"
class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-sm"
/>

<button type="button"
class="add-to-group bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded text-sm"
data-group="{{g.id}}">
Add
</button>

</div>

<!-- REQUEST LIST -->
<div class="space-y-1">

{% for i in g.items.all %}
<div class="flex justify-between items-center text-sm bg-gray-800 px-2 py-1 rounded">

<div>
<span class="text-gray-400">{{i.environment|upper}}</span>
<span class="ml-2 text-blue-400 font-mono">{{i.request_id}}</span>
</div>

<button type="button"
class="delete-group-item
text-yellow-400 hover:text-yellow-300
bg-yellow-900/20 hover:bg-yellow-900/30
px-2 py-1 rounded text-xs"
data-id="{{i.id}}">
<i class="fa-solid fa-trash"></i>
</button>

</div>
{% endfor %}

</div>

</div>

{% endfor %}

{% load static %}
<script src="{% static 'workbench/group_maintenance.js' %}"></script>

{% endblock %}
